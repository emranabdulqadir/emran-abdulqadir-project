<body>

    <div class="container">
 <header><h2>Join My Network</h2>
    <p>Sign up to compare results and collaborate with me.</p>
    <form id="myForm" action="/register" method="POST" onsubmit="validateForm(event)" >
    </header>
        <p>
            <label for="name">Full Name:</label><br>
            <input type="text" id="name" placeholder="enter your name" minlength="4" maxlength="10">
        </p>
        <p>
            <label for="email">Email Address:</label><br>
             <input type="email" id="email" placeholder="enter your email address" minlength="4" maxlength="10">
        </p>
        <p>
            <label for="interest">Primary Interest:</label><br>
            <select id="interest" name="user_interest">
                <option value="physics">Physics & Football</option>
                <option value="web">Web Development</option>
                <option value="space">Space Technology</option>
            </select>
        </p>
        <p>
            <label for="password">Create Password:</label><br>
       <input type="password" id="password" placeholder="enter password" minlength="4" maxlength="10"> 
        </p>
        <button id="submit" type="submit" size="50px">Register Now</button>
          <div id="errorMsg"></div> 
          <div id="successMsg"></div>
        <script>  
        function validateForm(event) { 
      event.preventDefault(); // Prevent form submission 
 
      var nameInput = document.getElementById("name"); 
      var emailInput = document.getElementById("email");
      var password = document.getElementById("password"); 
      var errorMsg = document.getElementById("errorMsg"); 
      var successMsg = document.getElementById("successMsg"); 
 
      errorMsg.innerHTML = ""; 
      successMsg.innerHTML = ""; 
 
      // Validate name 
      if (nameInput.value === "") { 
        errorMsg.innerHTML = "Please enter your name."; 
        return false; 
      } 
 
      // Validate email 
      if (emailInput.value === "") { 
        errorMsg.innerHTML = "Please enter your email."; 
        return false; 
      } 
 
       // Validate password
      if (passwordInput.value === "") { 
        errorMsg.innerHTML = "Please enter your password."; 
        return false; 
      } 

      // Form is valid 
      successMsg.innerHTML = "Form submitted successfully!"; 
      document.getElementById("myForm").reset(); 
    } 

    </script>
    </form>
    <footer> 
            <p>I you want to be my friend, register here </p> 
        </footer> 
    </body>
